<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王者荣耀皮肤数据库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── THEME VARIABLES ── */
:root {
  --gold: #c9a84c; --gold-light: #e8c97a; --gold-dark: #8b6914;
  --accent: #7b5ea7; --accent2: #4a7cbf;
  --red: #bf4a4a; --green: #4abf8a;
  --radius: 12px;
}

/* Dark theme (default) */
[data-theme="dark"] {
  --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --bg4: #22222e;
  --text: #e8e0d0; --text2: #a09880; --text3: #6a6050;
  --border: rgba(201,168,76,0.2);
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --header-bg: rgba(10,10,15,0.96);
  --input-bg: var(--bg3);
  --scrollbar-thumb: #8b6914;
  --table-hover: rgba(201,168,76,0.05);
  --timeline-bg: var(--bg4);
}

/* Light theme */
[data-theme="light"] {
  --bg: #f0f2f5; --bg2: #ffffff; --bg3: #ffffff; --bg4: #f5f6f8;
  --text: #1a1d23; --text2: #4a5568; --text3: #8a9ab0;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --header-bg: rgba(255,255,255,0.97);
  --input-bg: #f5f6f8;
  --scrollbar-thumb: #c9a84c;
  --table-hover: rgba(201,168,76,0.05);
  --timeline-bg: #f5f6f8;
}

/* Auto: follow system preference */
@media (prefers-color-scheme: dark) { [data-theme="auto"] {
  --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --bg4: #22222e;
  --text: #e8e0d0; --text2: #a09880; --text3: #6a6050;
  --border: rgba(201,168,76,0.2); --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --header-bg: rgba(10,10,15,0.96); --input-bg: var(--bg3); --scrollbar-thumb: #8b6914;
  --table-hover: rgba(201,168,76,0.05); --timeline-bg: var(--bg4);
}}
@media (prefers-color-scheme: light) { [data-theme="auto"] {
  --bg: #f0f2f5; --bg2: #ffffff; --bg3: #ffffff; --bg4: #f5f6f8;
  --text: #1a1d23; --text2: #4a5568; --text3: #8a9ab0;
  --border: rgba(0,0,0,0.08); --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --header-bg: rgba(255,255,255,0.97); --input-bg: #f5f6f8; --scrollbar-thumb: #c9a84c;
  --table-hover: rgba(201,168,76,0.05); --timeline-bg: #f5f6f8;
}}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 15px; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex; align-items: center; gap: 20px; height: 64px;
  box-shadow: 0 1px 0 var(--border);
}
.header-logo {
  font-family: 'Noto Serif SC', serif; font-weight: 900; font-size: 18px;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap; cursor: pointer; flex-shrink: 0;
}
.header-logo span { font-size: 10px; display: block; color: var(--text3); -webkit-text-fill-color: var(--text3); margin-top: -3px; letter-spacing: 1px; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  padding: 7px 18px; border-radius: 20px; cursor: pointer;
  font-size: 14px; font-weight: 500; transition: all 0.2s;
  color: var(--text2); border: 1px solid transparent; white-space: nowrap;
}
.nav-tab:hover { color: var(--gold); border-color: var(--border); }
.nav-tab.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: var(--border); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 20px; }
.header-stats { display: flex; gap: 20px; font-size: 13px; color: var(--text3); }
.header-stats b { color: var(--gold); font-size: 16px; }

/* THEME TOGGLE */
.theme-toggle { display: flex; gap: 3px; background: var(--bg4); border-radius: 20px; padding: 3px; border: 1px solid var(--border); }
.theme-btn {
  padding: 4px 10px; border-radius: 16px; cursor: pointer; font-size: 12px;
  color: var(--text3); transition: all 0.2s; white-space: nowrap; user-select: none;
}
.theme-btn:hover { color: var(--text2); }
[data-theme="dark"] .theme-btn.active { background: var(--bg3); color: var(--gold); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
[data-theme="light"] .theme-btn.active, [data-theme="auto"] .theme-btn.active { background: #fff; color: var(--gold); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
.theme-btn.active { background: var(--bg2); color: var(--gold); box-shadow: 0 1px 4px rgba(0,0,0,0.15); }

/* VIEWS */
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* FILTER BAR */
.filter-bar {
  padding: 14px 28px; background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.search-box { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px;
  background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; font-family: inherit;
}
.search-box input:focus { border-color: var(--gold); }
.search-box input::placeholder { color: var(--text3); }
.search-box .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 14px; }
.filter-select {
  padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; cursor: pointer; outline: none; font-family: inherit;
}
.filter-select:focus { border-color: var(--gold); }
.filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
  border: 1px solid var(--border); color: var(--text2); transition: all 0.2s; white-space: nowrap;
}
.chip:hover { border-color: var(--gold); color: var(--gold); }
.chip.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }
.filter-clear { font-size: 13px; color: var(--text3); cursor: pointer; padding: 6px 8px; }
.filter-clear:hover { color: var(--red); }

/* TABLE */
.table-container { padding: 0 28px 16px; overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.data-table th {
  text-align: left; padding: 11px 14px; background: var(--bg2);
  color: var(--text3); font-weight: 500; border-bottom: 1px solid var(--border);
  cursor: pointer; white-space: nowrap; user-select: none;
}
.data-table th:hover { color: var(--gold); }
.data-table th.sorted { color: var(--gold); }
.data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
[data-theme="dark"] .data-table td { border-bottom-color: rgba(255,255,255,0.04); }
.data-table tr:hover td { background: var(--table-hover); }
.data-table tr.clickable { cursor: pointer; }
.thumb-cell { width: 40px; padding-right: 4px !important; }
.thumb-img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--bg4); display: block; image-rendering: pixelated; }
.thumb-placeholder { width: 36px; height: 36px; border-radius: 6px; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.quality-badge-img { height: 20px; object-fit: contain; vertical-align: middle; image-rendering: pixelated; }

/* BADGES */
.badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.badge-史诗 { background: rgba(123,94,167,0.12); color: #7b5ea7; border: 1px solid rgba(123,94,167,0.3); }
.badge-传说 { background: rgba(180,130,20,0.1); color: #b07a10; border: 1px solid rgba(180,130,20,0.3); }
.badge-勇者 { background: rgba(50,110,200,0.1); color: #3264c8; border: 1px solid rgba(50,110,200,0.28); }
.badge-伴生 { background: rgba(30,160,100,0.1); color: #1a9060; border: 1px solid rgba(30,160,100,0.28); }
.badge-无双 { background: rgba(190,50,50,0.1); color: #c03030; border: 1px solid rgba(190,50,50,0.3); }
.badge-荣耀典藏 { background: rgba(190,100,20,0.1); color: #b05a10; border: 1px solid rgba(190,100,20,0.3); }
.badge-珍品传说 { background: rgba(180,130,20,0.15); color: #9a6a00; border: 1px solid rgba(180,130,20,0.4); }
.badge-珍品无双 { background: rgba(190,50,50,0.14); color: #b02020; border: 1px solid rgba(190,50,50,0.4); }
.badge-首发 { background: rgba(30,160,100,0.1); color: #1a9060; border: 1px solid rgba(30,160,100,0.28); }
.badge-返场 { background: rgba(50,110,200,0.1); color: #3264c8; border: 1px solid rgba(50,110,200,0.28); }
.badge-是 { background: rgba(30,160,100,0.08); color: #1a9060; }
.badge-否 { background: rgba(120,120,120,0.08); color: var(--text3); }

/* Dark overrides for badges - richer colors on dark bg */
[data-theme="dark"] .badge-史诗 { background: rgba(123,94,167,0.2); color: #b090d8; border-color: rgba(123,94,167,0.35); }
[data-theme="dark"] .badge-传说 { background: rgba(201,168,76,0.15); color: var(--gold); border-color: rgba(201,168,76,0.3); }
[data-theme="dark"] .badge-勇者 { background: rgba(74,124,191,0.15); color: #6ea4d8; border-color: rgba(74,124,191,0.3); }
[data-theme="dark"] .badge-伴生 { background: rgba(74,191,138,0.12); color: #50c090; border-color: rgba(74,191,138,0.25); }
[data-theme="dark"] .badge-无双 { background: rgba(191,74,74,0.15); color: #d07070; border-color: rgba(191,74,74,0.3); }
[data-theme="dark"] .badge-荣耀典藏 { background: rgba(201,120,30,0.15); color: #d4944a; border-color: rgba(201,120,30,0.3); }
[data-theme="dark"] .badge-珍品传说 { background: rgba(201,168,76,0.2); color: var(--gold); border-color: rgba(201,168,76,0.45); }
[data-theme="dark"] .badge-珍品无双 { background: rgba(191,74,74,0.22); color: #d07070; border-color: rgba(191,74,74,0.45); }
[data-theme="dark"] .badge-首发 { background: rgba(74,191,138,0.12); color: #50c090; border-color: rgba(74,191,138,0.25); }
[data-theme="dark"] .badge-返场 { background: rgba(74,124,191,0.15); color: #6ea4d8; border-color: rgba(74,124,191,0.3); }
[data-theme="dark"] .badge-是 { background: rgba(74,191,138,0.1); color: #50c090; }
[data-theme="dark"] .badge-否 { background: rgba(120,120,120,0.1); color: var(--text3); }

/* PAGINATION */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 12px 28px; border-top: 1px solid var(--border); font-size: 13px; }
.pagination-info { color: var(--text3); }
.pagination-btns { display: flex; gap: 4px; }
.pg-btn {
  padding: 6px 11px; border-radius: 6px; cursor: pointer;
  border: 1px solid var(--border); color: var(--text2); background: transparent; font-size: 13px; transition: all 0.2s;
}
.pg-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.pg-btn.active { background: rgba(201,168,76,0.15); border-color: var(--gold); color: var(--gold); }
.pg-btn:disabled { opacity: 0.3; cursor: default; }

/* HERO GRID */
.hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px 28px; }
.hero-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.hero-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow); }
.hero-name { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
.hero-job-mini { font-size: 11px; color: var(--text3); margin-bottom: 7px; line-height: 1.5; }
.hero-skin-count { font-size: 12px; color: var(--text2); }
.hero-skin-count b { color: var(--gold); font-size: 18px; }
.role-dots { display: flex; gap: 4px; justify-content: center; margin-top: 7px; flex-wrap: wrap; }
.role-dot { width: 7px; height: 7px; border-radius: 50%; }
.role-坦克 { background: #5599bb; } .role-战士 { background: #cc7733; } .role-刺客 { background: #aa4444; }
.role-法师 { background: #8855cc; } .role-射手 { background: #44aa66; } .role-辅助 { background: #ddaa22; }

/* HERO DETAIL */
.hero-detail-header { padding: 22px 28px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.breadcrumb { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
.breadcrumb a { color: var(--gold); cursor: pointer; }
.hero-detail-title { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 900; }
.hero-detail-meta { margin-top: 8px; display: flex; gap: 16px; flex-wrap: wrap; font-size: 14px; color: var(--text2); }

/* SKIN CARDS */
.hero-skins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; padding: 20px 28px; }
.skin-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all 0.2s; overflow: hidden;
}
.skin-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow); }
.skin-card-img {
  height: 86px; background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.skin-card-img img.skin-thumb { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
.skin-card-img .img-ph { font-size: 30px; }
.skin-card-img .return-badge {
  position: absolute; top: 6px; right: 6px;
  background: rgba(74,124,191,0.88); color: #fff;
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.skin-card-body { padding: 11px; }
.skin-card-name { font-weight: 700; font-size: 14px; margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.skin-card-meta { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.quality-img-inline { height: 17px; object-fit: contain; image-rendering: pixelated; }

/* SKIN DETAIL */
.skin-detail-wrap { max-width: 860px; margin: 0 auto; padding: 28px; }
.skin-detail-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
.skin-detail-top { display: flex; }
.skin-detail-img-wrap {
  width: 170px; flex-shrink: 0; background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; min-height: 170px;
}
.skin-detail-img-wrap img { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
.skin-detail-img-wrap .img-ph { font-size: 48px; color: var(--text3); }
.skin-detail-info { padding: 22px; flex: 1; min-width: 0; }
.skin-detail-name { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 900; margin-bottom: 5px; }
.skin-detail-hero { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
.skin-detail-attrs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.attr-item label { font-size: 12px; color: var(--text3); display: block; margin-bottom: 4px; }
.attr-item .val { font-size: 14px; font-weight: 500; }
.skin-timeline { padding: 20px 22px; border-top: 1px solid var(--border); }
.timeline-title { font-size: 14px; color: var(--text3); font-weight: 500; margin-bottom: 12px; }
.timeline-list { display: flex; flex-direction: column; gap: 7px; }
.timeline-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 8px; background: var(--timeline-bg); border-left: 3px solid transparent;
}
.timeline-item.first { border-left-color: var(--green); }
.timeline-item.return { border-left-color: var(--accent2); }
.timeline-item.latest { background: rgba(74,124,191,0.08); }
.timeline-date { font-size: 14px; font-weight: 600; min-width: 96px; }
.timeline-label { flex: 1; font-size: 14px; color: var(--text2); }
.timeline-obtain { font-size: 13px; color: var(--text3); }
.timeline-latest-tag { font-size: 11px; background: rgba(74,124,191,0.25); color: var(--accent2); padding: 2px 8px; border-radius: 10px; }

/* STATS */
.stats-wrap { padding: 28px; max-width: 1200px; }
.stats-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 900; margin-bottom: 20px; color: var(--gold); }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.stat-card .stat-label { font-size: 13px; color: var(--text3); margin-bottom: 6px; }
.stat-card .stat-value { font-size: 30px; font-weight: 700; color: var(--gold); font-family: 'Noto Serif SC', serif; }
.stat-card .stat-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
.chart-section { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
.chart-section h3 { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { min-width: 80px; font-size: 13px; color: var(--text2); text-align: right; }
.bar-track { flex: 1; height: 24px; background: var(--bg4); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 600; transition: width 0.8s cubic-bezier(.2,.8,.3,1); }
.bar-count { min-width: 30px; font-size: 13px; color: var(--text3); }

/* PIE CHART */
.pie-chart-wrap { display: flex; align-items: center; gap: 24px; }
.pie-svg-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
.pie-svg-wrap svg { display: block; }
.pie-center-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.pie-center-total { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 900; color: var(--gold); line-height: 1; }
.pie-center-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.pie-segment { transition: opacity 0.2s; cursor: pointer; }
.pie-segment:hover { opacity: 0.82; }
.pie-segment.dimmed { opacity: 0.2; }
.pie-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
.pie-legend-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; transition: all 0.2s;
}
.pie-legend-item:hover { background: var(--bg4); border-color: var(--border); }
.pie-legend-item.active { background: rgba(201,168,76,0.08); border-color: var(--border); }
.pie-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pie-legend-name { font-size: 14px; font-weight: 500; flex: 1; }
.pie-legend-count { font-size: 14px; font-weight: 700; }
.pie-legend-pct { font-size: 12px; color: var(--text3); min-width: 38px; text-align: right; }

/* QUALITY SKIN LIST PANEL */
.quality-skin-panel {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  margin-top: 14px; overflow: hidden; animation: fadeIn 0.25s ease;
}
.quality-skin-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.quality-skin-panel-title { font-size: 14px; font-weight: 700; }
.quality-skin-panel-close { cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px 6px; }
.quality-skin-panel-close:hover { color: var(--text); }
.quality-skin-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; padding: 14px 18px; max-height: 480px; overflow-y: auto; }

/* Light mode card elevation */
[data-theme="light"] .skin-card,
[data-theme="light"] .hero-card,
[data-theme="light"] .stat-card,
[data-theme="light"] .chart-section,
[data-theme="light"] .skin-detail-card,

const SUPABASE_URL = 'https://erphrsydujqrcvtpdtnf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycGhyc3lkdWpxcmN2dHBkdG5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MDU2ODQsImV4cCI6MjA4OTI4MTY4NH0.O6h3Eeq9gNfGAMYkZ5_1GY5lFBiJrF8fJat0Pxz868U';

// ── Supabase fetch 工具 ──────────────────────────────────────
async function sbFetch(table, filters = {}, options = {}) {
  // Supabase REST API: 过滤条件直接作为 query param，格式是 column=operator.value
  const params = new URLSearchParams();

  // select 字段
  if (options.select) params.set('select', options.select);
  // order
  if (options.order) params.set('order', options.order);
  // limit / offset（分页）
  if (options.limit  !== undefined) params.set('limit',  options.limit);
  if (options.offset !== undefined) params.set('offset', options.offset);

  // 过滤条件：{ img_id: 'eq.xxx' } → ?img_id=eq.xxx
  // 特殊：in 过滤 { img_id: 'in.(a,b,c)' } → ?img_id=in.(a,b,c)
  // URLSearchParams 会对括号编码，所以手动拼 URL
  let url = `${SUPABASE_URL}/rest/v1/${table}?${params.toString()}`;
  for (const [col, val] of Object.entries(filters)) {
    url += `&${col}=${val}`;
  }

  const res = await fetch(url, {
    headers: {
      'apikey':        SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Prefer':        'count=none',
    }
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Supabase ${res.status}: ${text.slice(0, 100)}`);
  }
  return res.json();
}

// ── 分批拉取所有数据 ──────────────────────────────────────────
async function fetchAllSkins() {
  const BATCH = 1000;
  let all = [], offset = 0;
  while (true) {
    const rows = await sbFetch('skins', {}, {
      select: 'date,name,quality,tag,hero,job,price,obtain,type,permanent,skin_img_id,tag_img_id',
      order:  'date.desc',
      limit:  BATCH,
      offset: offset,
    });
    all = all.concat(rows);
    if (rows.length < BATCH) break;
    offset += BATCH;
  }
  return all.map(r => ({
    date:      r.date,
    name:      r.name,
    quality:   r.quality,
    tag:       r.tag      || '',
    hero:      r.hero,
    job:       r.job      || '',
    price:     r.price    || '',
    obtain:    r.obtain   || '',
    type:      r.type,
    permanent: r.permanent || '否',
    si:        r.skin_img_id || '',
    qi:        r.tag_img_id  || '',
  }));
}

// ── 图片缓存（按需加载）──────────────────────────────────────
const IMG_CACHE = {};
async function fetchImg(imgId) {
  if (!imgId) return null;
  if (IMG_CACHE[imgId] !== undefined) return IMG_CACHE[imgId];
  IMG_CACHE[imgId] = null;
  try {
    const rows = await sbFetch('images',
      { img_id: `eq.${imgId}` },
      { select: 'data,mime_type', limit: 1 }
    );
    if (rows.length) {
      IMG_CACHE[imgId] = `data:${rows[0].mime_type};base64,${rows[0].data}`;
    }
  } catch {}
  return IMG_CACHE[imgId];
}

// ── 批量预加载图片 ────────────────────────────────────────────
async function preloadImgs(imgIds) {
  const toLoad = [...new Set(imgIds)].filter(id => id && IMG_CACHE[id] === undefined);
  if (!toLoad.length) return;
  toLoad.forEach(id => IMG_CACHE[id] = null);
  const BATCH = 50;
  for (let i = 0; i < toLoad.length; i += BATCH) {
    const batch = toLoad.slice(i, i + BATCH);
    try {
      // Supabase in() 过滤格式：img_id=in.(id1,id2,id3)
      const rows = await sbFetch('images',
        { img_id: `in.(${batch.join(',')})` },
        { select: 'img_id,data,mime_type', limit: BATCH }
      );
      rows.forEach(r => {
        IMG_CACHE[r.img_id] = `data:${r.mime_type};base64,${r.data}`;
      });
    } catch (e) {
      console.warn('preloadImgs batch failed:', e);
    }
  }
}

// ── 全局数据（异步加载后填充）────────────────────────────────
let RAW = [];

function getQualityImg(qi) {
  if (!qi) return null;
  return IMG_CACHE[qi] || null;
}
function getSkinImg(si) {
  if (!si) return null;

// ── State ──
let filtered = [...RAW], sortField = 'date', sortDir = -1;
let page = 1; const PAGE_SIZE = 50;
let fHero = '', fQuality = '', fType = '', fSearch = '';
let heroRoleFilter = '', heroLaneFilter = '', heroSearch = '';

// ── Init ──
window.onload = async () => {
  // Sync theme
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.t === savedTheme));

  try {
    // 1. 拉取皮肤数据
    setLoadingText('加载皮肤数据…');
    RAW = await fetchAllSkins();

    // 2. 预加载第一页可见的图片（皮肤图 + 标签图）
    setLoadingText('加载图片资源…');
    const firstPageIds = RAW.slice(0, 100).flatMap(r => [r.si, r.qi]).filter(Boolean);
    await preloadImgs(firstPageIds);

    // 3. 初始化 UI
    setLoadingText('渲染页面…');
    buildHeroSelect();
    filterList();
    renderHeroGrid();
    renderStats();

    const total = RAW.length.toLocaleString();
    const heroes = new Set(RAW.map(r=>r.hero)).size;
    const skinSet = new Set(RAW.map(r=>r.hero+'|'+r.name)).size;
    document.getElementById('hd-total').textContent = total;
    document.getElementById('hd-heroes').textContent = heroes;
    document.getElementById('hd-skins').textContent = skinSet;
    document.getElementById('sb-total').textContent = total;
    document.getElementById('sb-heroes').textContent = heroes;
    document.getElementById('sb-skins').textContent = skinSet;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // 4. 后台静默预加载剩余图片
    const remainIds = RAW.slice(100).flatMap(r => [r.si, r.qi]).filter(Boolean);
    preloadImgs(remainIds); // 不 await，后台静默加载

  } catch (e) {
    setLoadingText('加载失败，请刷新重试');
    console.error('Init error:', e);
  }
};

function buildHeroSelect() {
  const heroes = [...new Set(RAW.map(r=>r.hero))].sort();
  const sel = document.getElementById('f-hero');
  heroes.forEach(h => { const o = document.createElement('option'); o.textContent = h; o.value = h; sel.appendChild(o); });
}

function showView(v, el, snavId) {
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav-item').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if (el) el.classList.add('active');
  // Sync top tabs and sidebar
  const tabId = 'tab-'+v;
  const snavEl = document.getElementById('snav-'+(snavId||v));
  if (document.getElementById(tabId)) document.getElementById(tabId).classList.add('active');

// ── List ──
function setTypeFilter(el, val) {
  document.querySelectorAll('.chip[data-ftype]').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); fType = val; page = 1; filterList();
}
function clearFilters() {
  fHero=''; fQuality=''; fType=''; fSearch='';
  document.getElementById('f-hero').value='';
  document.getElementById('f-quality').value='';
  document.getElementById('search-list').value='';
  document.querySelectorAll('.chip[data-ftype]').forEach((c,i)=>c.classList.toggle('active',i===0));
  filterList();
}
function filterList() {
  fHero = document.getElementById('f-hero').value;
  fQuality = document.getElementById('f-quality').value;
  fSearch = document.getElementById('search-list').value.trim().toLowerCase();
  filtered = RAW.filter(r => {
    if (fHero && r.hero !== fHero) return false;
    if (fQuality && r.quality !== fQuality) return false;
    if (fType && r.type !== fType) return false;
    if (fSearch && !r.name.toLowerCase().includes(fSearch) && !r.hero.toLowerCase().includes(fSearch)) return false;
    return true;
  });
  sortData(); page = 1; renderTable();
}
function sortTable(field) {
  if (sortField === field) sortDir *= -1; else { sortField = field; sortDir = -1; }
  sortData(); renderTable();
}
function sortData() {
  filtered.sort((a,b) => {
    let av = a[sortField]||'', bv = b[sortField]||'';
    if (sortField==='price') return sortDir*((parseFloat(av)||0)-(parseFloat(bv)||0));
    return sortDir*(av>bv?1:av<bv?-1:0);
  });
}

function thumbHtml(si, quality) {
  const src = getSkinImg(si);
  if (src) return `<img class="thumb-img" src="${src}" loading="lazy" alt="" data-si="${si}">`;

}
// qi字段实为皮肤标签图片
function tagImgHtml(qi, tag, quality) {
  const src = getQualityImg(qi);
  if (src) return `<img class="quality-badge-img" src="${src}" loading="lazy" alt="${tag}" title="${tag}">`;

  if (tag === quality) return `<span class="badge badge-${quality}">${quality}</span>`;
  return `<span style="font-size:11px;color:var(--text3)">${tag}</span>`;
}

renderTable._refreshMobile = function(rows) {
  const cards = document.querySelectorAll('.mobile-skin-card');
  rows.forEach((r, i) => {

    if (r.si && IMG_CACHE[r.si] && thumb && !thumb.querySelector('img')) {
      thumb.innerHTML = `<img src="${IMG_CACHE[r.si]}" loading="lazy" alt="">`;

    if (r.qi && IMG_CACHE[r.qi]) {
      const tagEl = cards[i].querySelector('.mobile-skin-meta:last-child');

        tagEl.innerHTML = `<img src="${IMG_CACHE[r.qi]}" style="height:16px;object-fit:contain;image-rendering:pixelated" alt="${r.tag}">`;

function parseRoles(job) { return ['坦克','战士','刺客','法师','射手','辅助'].filter(r=>job.includes(r)); }
function parseLanes(job) { return ['对抗路','中路','发育路','打野','游走'].filter(l=>job.includes(l)); }
function setRoleFilter(el,val) { document.querySelectorAll('#role-chips .chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); heroRoleFilter=val; renderHeroGrid(); }
function setLaneFilter(el,val) { document.querySelectorAll('#lane-chips .chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); heroLaneFilter=val; renderHeroGrid(); }
function filterHeroes() { heroSearch=document.getElementById('search-hero').value.trim().toLowerCase(); renderHeroGrid(); }

function buildHeroMap() {
  const m = {};
  RAW.forEach(r => {
    if (!m[r.hero]) m[r.hero] = { job: r.job, skins: new Map() };
    const key = r.name;
    if (!m[r.hero].skins.has(key)) m[r.hero].skins.set(key, { name:r.name, quality:r.quality, tag:r.tag, si:r.si, qi:r.qi, records:[] });
    m[r.hero].skins.get(key).records.push(r);
    // Update si/qi if available
    if (r.si) m[r.hero].skins.get(key).si = r.si;
    if (r.qi) m[r.hero].skins.get(key).qi = r.qi;
  });
  return m;
}

function renderHeroGrid() {
  const heroMap = buildHeroMap();
  let heroes = Object.entries(heroMap).sort((a,b)=>b[1].skins.size-a[1].skins.size);
  if (heroSearch) heroes = heroes.filter(([h])=>h.includes(heroSearch));
  if (heroRoleFilter) heroes = heroes.filter(([h,d])=>parseRoles(d.job).includes(heroRoleFilter));
  if (heroLaneFilter) heroes = heroes.filter(([h,d])=>parseLanes(d.job).includes(heroLaneFilter));
  const grid = document.getElementById('hero-grid');
  if (!heroes.length) { grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎭</div><p>未找到匹配的英雄</p></div>'; return; }
  grid.innerHTML = heroes.map(([hero,data]) => {
    const roles = parseRoles(data.job);
    const lanes = parseLanes(data.job);
    return `<div class="hero-card" onclick="openHeroDetail('${esc(hero)}')">
      <div class="hero-name">${hero}</div>
      <div class="hero-job-mini">${roles.join('/')}${lanes.length?'<br>'+lanes.join('/'):''}</div>
      <div class="hero-skin-count"><b>${data.skins.size}</b> 款皮肤</div>
      <div class="role-dots">${roles.map(r=>`<div class="role-dot role-${r}" title="${r}"></div>`).join('')}</div>
    </div>`;
  }).join('');
}

// ── Stats ──
let activeQuality = null;
let trendDataType = '首发'; // '首发' | '返场'
let selectedMonthYear = null;
let compareYears = new Set();

// 品质顺序和颜色（全局共用）
const Q_ORDER  = ['伴生','勇者','史诗','传说','珍品传说','无双','珍品无双','荣耀典藏'];
const Q_COLORS = {'史诗':'#b090d8','传说':'#d4a830','勇者':'#6ea4d8','伴生':'#50c090','无双':'#d07070','荣耀典藏':'#d4944a','珍品传说':'#c8a000','珍品无双':'#c04040'};

function renderStats() {
  const heroMap = buildHeroMap();
  const qualityCounts = {};
  RAW.forEach(r => { qualityCounts[r.quality]=(qualityCounts[r.quality]||0)+1; });
  const heroCounts = {};
  Object.entries(heroMap).forEach(([h,d])=>heroCounts[h]=d.skins.size);
  const topHeroes = Object.entries(heroCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const totalSkins = new Set(RAW.map(r=>r.hero+'|'+r.name)).size;
  const total = Object.values(qualityCounts).reduce((a,b)=>a+b,0);
  const maxH = topHeroes[0]?.[1]||1;

  // 饼图
  const R = 100, cx = 120, cy = 120, innerR = 62;
  const qs = Q_ORDER.filter(q=>qualityCounts[q]);
  let cumAngle = -Math.PI/2;
  const segments = qs.map(q => {
    const frac = qualityCounts[q]/total;
    const startAngle = cumAngle;
    cumAngle += frac * 2 * Math.PI;
    return { q, count: qualityCounts[q], frac, startAngle, endAngle: cumAngle };
  });
  function polar(angle, r) { return [cx + r*Math.cos(angle), cy + r*Math.sin(angle)]; }
  function segPath(s, r1, r2, gap=0.012) {
    const sa = s.startAngle+gap, ea = s.endAngle-gap;
    const [ox1,oy1]=polar(sa,r1),[ox2,oy2]=polar(ea,r1),[ix1,iy1]=polar(ea,r2),[ix2,iy2]=polar(sa,r2);
    const large=(ea-sa)>Math.PI?1:0;
    return `M${ox1},${oy1} A${r1},${r1} 0 ${large},1 ${ox2},${oy2} L${ix1},${iy1} A${r2},${r2} 0 ${large},0 ${ix2},${iy2} Z`;
  }
  const pieSvg = `<svg width="240" height="240" viewBox="0 0 240 240">
    ${segments.map(s=>`<path id="seg-${s.q}" class="pie-segment" d="${segPath(s,R,innerR)}"
      fill="${Q_COLORS[s.q]}" opacity="0.85" onclick="selectQuality('${s.q}')" data-q="${s.q}">
      <title>${s.q}: ${s.count} (${(s.frac*100).toFixed(1)}%)</title></path>`).join('')}
  </svg>`;

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-title">📊 数据统计概览</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">总记录数</div><div class="stat-value">${RAW.length.toLocaleString()}</div><div class="stat-sub">含首发与返场</div></div>
      <div class="stat-card"><div class="stat-label">英雄数量</div><div class="stat-value">${Object.keys(heroMap).length}</div><div class="stat-sub">已收录英雄</div></div>
      <div class="stat-card"><div class="stat-label">皮肤款数</div><div class="stat-value">${totalSkins}</div><div class="stat-sub">唯一皮肤（英雄+名称）</div></div>
      <div class="stat-card"><div class="stat-label">首发上线</div><div class="stat-value">${RAW.filter(r=>r.type==='首发').length}</div><div class="stat-sub">次首发记录</div></div>
      <div class="stat-card"><div class="stat-label">返场次数</div><div class="stat-value">${RAW.filter(r=>r.type==='返场').length}</div><div class="stat-sub">次返场记录</div></div>
      <div class="stat-card"><div class="stat-label">常驻皮肤</div><div class="stat-value">${new Set(RAW.filter(r=>r.permanent==='是').map(r=>r.hero+'|'+r.name)).size}</div><div class="stat-sub">款常驻皮肤</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="chart-section">
        <h3>各品质皮肤分布 <span style="color:var(--text3);font-weight:400">· 点击查看皮肤列表</span></h3>
        <div class="pie-chart-wrap">
          <div class="pie-svg-wrap">
            ${pieSvg}
            <div class="pie-center-label">
              <div class="pie-center-total" id="pie-center-num">${total}</div>
              <div class="pie-center-sub" id="pie-center-txt">条记录</div>
            </div>
          </div>
          <div class="pie-legend" id="pie-legend">
            ${segments.map(s=>`
              <div class="pie-legend-item" id="leg-${s.q}" onclick="selectQuality('${s.q}')">
                <div class="pie-legend-dot" style="background:${Q_COLORS[s.q]}"></div>
                <div class="pie-legend-name">${s.q}</div>
                <div class="pie-legend-count" style="color:${Q_COLORS[s.q]}">${s.count}</div>
                <div class="pie-legend-pct">${(s.frac*100).toFixed(1)}%</div>
              </div>`).join('')}
          </div>
        </div>
        <div id="quality-skin-panel"></div>
      </div>
      <div class="chart-section">
        <h3>皮肤数量 TOP 10 英雄</h3>
        <div class="bar-chart">
          ${topHeroes.map(([h,c])=>`
            <div class="bar-row">
              <div class="bar-label" style="color:var(--gold-light);cursor:pointer" onclick="openHeroFromStats('${esc(h)}')">${h}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/maxH*100)}%;background:rgba(201,168,76,0.12);border-left:3px solid var(--gold);color:var(--gold)">${c}</div></div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- ── 趋势分析区块 ── -->
    <div class="chart-section" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <h3 style="margin:0">📈 皮肤投放趋势分析</h3>
        <div class="filter-chips">
          <div class="chip${trendDataType==='首发'?' active':''}" onclick="setTrendType('首发')">首发数据</div>
          <div class="chip${trendDataType==='返场'?' active':''}" onclick="setTrendType('返场')">返场数据</div>
        </div>
      </div>

      <!-- 图表1：每年各品质堆叠柱状图 -->
      <div style="margin-bottom:24px">
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px">
          各年度品质分布
          <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:8px">· 点击年份柱查看月度详情</span>
        </div>
        <div id="chart-yearly"></div>
      </div>

      <!-- 图表2：选中年份的月度品质堆叠柱状图 -->
      <div style="margin-bottom:24px" id="chart-monthly-wrap">
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px" id="chart-monthly-title">
          月度品质分布 <span style="font-size:11px;color:var(--text3);font-weight:400">· 点击上方年份柱查看</span>
        </div>
        <div id="chart-monthly"></div>
      </div>

      <!-- 图表3：多年对比 -->
      <div>
        <div style="font-size:13px;color:var(--text2);font-weight:600;margin-bottom:10px">
          多年月度投放量对比
          <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:8px">· 最多选4年</span>
        </div>
        <div id="year-compare-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"></div>
        <div id="chart-compare"></div>
      </div>
    </div>`;

  activeQuality = null;
  renderTrendCharts();
  renderYearCompareChips();
}

// ── 趋势数据切换 ──────────────────────────────────────────────
function setTrendType(type) {
  trendDataType = type;
  selectedMonthYear = null;
  document.querySelectorAll('.filter-chips .chip[onclick*="setTrendType"]').forEach(c => {
    c.classList.toggle('active', c.textContent.includes(type));
  });
  renderTrendCharts();
}

// ── 渲染趋势图 ────────────────────────────────────────────────
function renderTrendCharts() {
  renderYearlyChart();
  if (selectedMonthYear) renderMonthlyChart(selectedMonthYear);
  else document.getElementById('chart-monthly').innerHTML = '';
  renderCompareChart();
}

// ── 图表1：年度堆叠柱状图 ─────────────────────────────────────
function renderYearlyChart() {
  const data = RAW.filter(r => r.type === trendDataType);
  const years = [...new Set(data.map(r=>r.date.slice(0,4)))].sort();

  // 每年各品质数量
  const yearData = {};
  years.forEach(y => { yearData[y] = {}; Q_ORDER.forEach(q => yearData[y][q] = 0); });
  data.forEach(r => { if (yearData[r.date.slice(0,4)]) yearData[r.date.slice(0,4)][r.quality] = (yearData[r.date.slice(0,4)][r.quality]||0) + 1; });

  const maxTotal = Math.max(...years.map(y => Q_ORDER.reduce((s,q)=>s+(yearData[y][q]||0),0)));
  const svgH = 200, barW = 36, gap = 14, labelH = 24, padL = 36, padR = 10;
  const chartW = years.length * (barW + gap) + padL + padR;
  const chartH = svgH + labelH;

  let bars = '', xLabels = '', yGridLines = '';
  // Y轴网格
  for (let i=0;i<=4;i++) {
    const y = svgH - (i/4)*svgH;
    const val = Math.round(i/4*maxTotal);
    yGridLines += `<line x1="${padL}" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    yGridLines += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text3)">${val}</text>`;
  }

  years.forEach((y, i) => {
    const x = padL + i * (barW + gap);
    let yOff = svgH;
    const isSelected = selectedMonthYear === y;
    Q_ORDER.forEach(q => {
      const count = yearData[y][q] || 0;
      if (!count) return;
      const h = (count / maxTotal) * svgH;
      yOff -= h;
      bars += `<rect x="${x}" y="${yOff}" width="${barW}" height="${h}"
        fill="${Q_COLORS[q]}" opacity="${isSelected?'1':'0.82'}"
        rx="1" style="cursor:pointer"
        onclick="clickYearBar('${y}')"
        data-year="${y}" data-q="${q}" data-count="${count}">
        <title>${y} · ${q}: ${count}</title></rect>`;
    });
    if (isSelected) bars += `<rect x="${x-1}" y="0" width="${barW+2}" height="${svgH}" fill="none" stroke="var(--gold)" stroke-width="2" rx="2"/>`;
    xLabels += `<text x="${x+barW/2}" y="${svgH+16}" text-anchor="middle" font-size="11"
      fill="${isSelected?'var(--gold)':'var(--text2)'}" font-weight="${isSelected?'700':'400'}"
      style="cursor:pointer" onclick="clickYearBar('${y}')">${y}</text>`;
  });

  // 品质图例
  const legendItems = Q_ORDER.filter(q => years.some(y=>yearData[y][q]>0));
  const legendSvg = legendItems.map((q,i) =>
    `<g transform="translate(${i*90},0)">
      <rect width="10" height="10" fill="${Q_COLORS[q]}" rx="2"/>
      <text x="14" y="9" font-size="11" fill="var(--text2)">${q}</text>
    </g>`).join('');

  document.getElementById('chart-yearly').innerHTML = `
    <div style="overflow-x:auto">
      <svg width="${Math.max(chartW,300)}" height="${chartH}" style="display:block">
        ${yGridLines}${bars}${xLabels}
      </svg>
    </div>
    <svg width="${legendItems.length*90+10}" height="16" style="margin-top:10px;display:block">${legendSvg}</svg>`;
}

// ── 图表2：月度堆叠柱状图 ─────────────────────────────────────
function clickYearBar(year) {
  selectedMonthYear = selectedMonthYear === year ? null : year;
  renderYearlyChart(); // 重绘以更新高亮
  if (selectedMonthYear) {
    renderMonthlyChart(selectedMonthYear);
    document.getElementById('chart-monthly-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    document.getElementById('chart-monthly').innerHTML = '';
    document.getElementById('chart-monthly-title').innerHTML = '月度品质分布 <span style="font-size:11px;color:var(--text3);font-weight:400">· 点击上方年份柱查看</span>';
  }
}

function renderMonthlyChart(year) {
  document.getElementById('chart-monthly-title').innerHTML =
    `${year} 年月度品质分布 <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px">(${trendDataType})</span>
     <span style="font-size:11px;color:var(--text3);cursor:pointer;margin-left:8px" onclick="clickYearBar('${year}')">× 收起</span>`;

  const data = RAW.filter(r => r.type === trendDataType && r.date.slice(0,4) === year);
  const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const monthData = {};
  months.forEach(m => { monthData[m] = {}; Q_ORDER.forEach(q => monthData[m][q] = 0); });
  data.forEach(r => { const m = r.date.slice(5,7); if(monthData[m]) monthData[m][r.quality] = (monthData[m][r.quality]||0)+1; });

  const maxTotal = Math.max(...months.map(m => Q_ORDER.reduce((s,q)=>s+(monthData[m][q]||0),0)), 1);
  const svgH = 160, barW = 32, gap = 10, labelH = 22, padL = 30;
  const chartW = months.length*(barW+gap)+padL+10;

  let bars = '', xLabels = '', yGridLines = '';
  for (let i=0;i<=4;i++) {
    const y = svgH-(i/4)*svgH;
    yGridLines += `<line x1="${padL}" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    yGridLines += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text3)">${Math.round(i/4*maxTotal)}</text>`;
  }
  months.forEach((m, i) => {
    const x = padL + i*(barW+gap);
    let yOff = svgH;
    Q_ORDER.forEach(q => {
      const count = monthData[m][q]||0;
      if (!count) return;
      const h = (count/maxTotal)*svgH;
      yOff -= h;
      bars += `<rect x="${x}" y="${yOff}" width="${barW}" height="${h}" fill="${Q_COLORS[q]}" opacity="0.85" rx="1">
        <title>${year}-${m} · ${q}: ${count}</title></rect>`;
    });
    const total = Q_ORDER.reduce((s,q)=>s+(monthData[m][q]||0),0);
    xLabels += `<text x="${x+barW/2}" y="${svgH+15}" text-anchor="middle" font-size="11" fill="${total?'var(--text2)':'var(--text3)'}">${parseInt(m)}月</text>`;
  });

  document.getElementById('chart-monthly').innerHTML = `
    <div style="overflow-x:auto">
      <svg width="${chartW}" height="${svgH+labelH}" style="display:block">${yGridLines}${bars}${xLabels}</svg>
    </div>`;
}

// ── 图表3：多年对比折线+柱图 ─────────────────────────────────
function renderYearCompareChips() {
  const years = [...new Set(RAW.map(r=>r.date.slice(0,4)))].sort();
  document.getElementById('year-compare-chips').innerHTML = years.map(y => `
    <div class="chip${compareYears.has(y)?' active':''}" onclick="toggleCompareYear('${y}')">${y}</div>
  `).join('');
}

function toggleCompareYear(year) {
  if (compareYears.has(year)) {
    compareYears.delete(year);
  } else {
    if (compareYears.size >= 4) { alert('最多选择4个年份进行对比'); return; }
    compareYears.add(year);
  }
  renderYearCompareChips();
  renderCompareChart();
}

function renderCompareChart() {
  const el = document.getElementById('chart-compare');
  if (compareYears.size === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:24px;font-size:13px">请在上方选择年份进行对比（最多4年）</div>';
    return;
  }

  const years = [...compareYears].sort();
  const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
  const YEAR_COLORS = ['#c9a84c','#6ea4d8','#50c090','#d07070'];

  // 每年每月总数
  const yearMonthTotal = {};
  years.forEach(y => {
    yearMonthTotal[y] = {};
    months.forEach(m => yearMonthTotal[y][m] = 0);
    RAW.filter(r => r.type===trendDataType && r.date.slice(0,4)===y)
      .forEach(r => { const m=r.date.slice(5,7); if(yearMonthTotal[y][m]!==undefined) yearMonthTotal[y][m]++; });
  });

  const allVals = years.flatMap(y => months.map(m => yearMonthTotal[y][m]));
  const maxVal = Math.max(...allVals, 1);
  const svgH = 180, padL = 34, padR = 14, padT = 10, labelH = 22;
  const barGroupW = 28, barW = Math.max(4, Math.floor((barGroupW - 2) / years.length));
  const gap = 18;
  const chartW = months.length * (barGroupW + gap) + padL + padR;

  let bars = '', xLabels = '', yGrid = '', lines = {};
  years.forEach(y => lines[y] = []);

  // Y轴
  for (let i=0;i<=4;i++) {
    const y = padT + svgH - (i/4)*svgH;
    yGrid += `<line x1="${padL}" y1="${y}" x2="${chartW}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    yGrid += `<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--text3)">${Math.round(i/4*maxVal)}</text>`;
  }

  months.forEach((m, mi) => {
    const groupX = padL + mi*(barGroupW+gap);
    years.forEach((y, yi) => {
      const count = yearMonthTotal[y][m];
      const barH = (count/maxVal)*svgH;
      const x = groupX + yi*barW;
      const yPos = padT + svgH - barH;
      bars += `<rect x="${x}" y="${yPos}" width="${barW-1}" height="${barH}"
        fill="${YEAR_COLORS[yi]}" opacity="0.75" rx="1">
        <title>${y}年${parseInt(m)}月: ${count}</title></rect>`;
      // 折线点（用柱中心）
      lines[y].push({ x: x + barW/2, y: yPos, count });
    });
    xLabels += `<text x="${groupX+barGroupW/2}" y="${padT+svgH+15}" text-anchor="middle" font-size="11" fill="var(--text2)">${parseInt(m)}月</text>`;
  });

  // 折线
  let lineSvg = '';
  years.forEach((y, yi) => {
    const pts = lines[y];
    const d = pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
    lineSvg += `<path d="${d}" fill="none" stroke="${YEAR_COLORS[yi]}" stroke-width="2" opacity="0.9"/>`;
    pts.forEach(p => {
      lineSvg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${YEAR_COLORS[yi]}"><title>${y}: ${p.count}</title></circle>`;
    });
  });

  // 图例
  const legendSvg = years.map((y,i) =>
    `<g transform="translate(${i*80},0)">
      <rect width="12" height="12" fill="${YEAR_COLORS[i]}" rx="2" opacity="0.85"/>
      <text x="16" y="10" font-size="12" fill="var(--text2)" font-weight="600">${y}</text>
    </g>`).join('');

  el.innerHTML = `
    <div style="overflow-x:auto">
      <svg width="${chartW}" height="${padT+svgH+labelH}" style="display:block">
        ${yGrid}${bars}${lineSvg}${xLabels}
      </svg>
    </div>
    <svg width="${years.length*80+10}" height="16" style="margin-top:10px;display:block">${legendSvg}</svg>`;
}


function selectQuality(q) {
  const qColors = Q_COLORS;

  if (activeQuality === q) {
    // Deselect
    activeQuality = null;
    document.querySelectorAll('.pie-segment').forEach(el => el.classList.remove('dimmed'));
    document.querySelectorAll('.pie-legend-item').forEach(el => el.classList.remove('active'));
    document.getElementById('quality-skin-panel').innerHTML = '';
    document.getElementById('pie-center-num').textContent = RAW.length;
    document.getElementById('pie-center-txt').textContent = '条记录';
    return;
  }

  activeQuality = q;

  // Dim other segments
  document.querySelectorAll('.pie-segment').forEach(el => {
    el.classList.toggle('dimmed', el.dataset.q !== q);
  });
  document.querySelectorAll('.pie-legend-item').forEach(el => {
    el.classList.toggle('active', el.id === 'leg-'+q);
  });

  // Update center label
  const qRecords = RAW.filter(r=>r.type==='首发' && r.quality===q);
  const count = RAW.filter(r=>r.quality===q).length;
  document.getElementById('pie-center-num').textContent = count;
  document.getElementById('pie-center-txt').textContent = q;

  // Build unique skins for this quality (by hero+name, 首发 only)
  const skinMap = new Map();
  RAW.filter(r=>r.quality===q).forEach(r => {
    const key = r.hero+'|'+r.name;
    if (!skinMap.has(key)) skinMap.set(key, r);
    else if (r.type==='首发') skinMap.set(key, {...skinMap.get(key), ...r});
  });
  const skins = [...skinMap.values()];

  const color = qColors[q] || '#ccc';
  const panel = document.getElementById('quality-skin-panel');
  panel.innerHTML = `
    <div class="quality-skin-panel" style="border-color:${color}33">
      <div class="quality-skin-panel-header">
        <div class="quality-skin-panel-title">
          <span class="badge badge-${q}" style="margin-right:8px">${q}</span>
          共 <b style="color:${color}">${skins.length}</b> 款皮肤
        </div>
        <div class="quality-skin-panel-close" onclick="selectQuality('${q}')">×</div>
      </div>
      <div class="quality-skin-list">
        ${skins.map(s => {
          const imgSrc = getSkinImg(s.si);
          const tagSrc = getQualityImg(s.qi);
          return `<div class="skin-card" onclick="goSkinDetail('${esc(s.hero)}','${esc(s.name)}')">
            <div class="skin-card-img">
              ${imgSrc ? `<img class="skin-thumb" src="${imgSrc}" loading="lazy" alt="${s.name}">` : `<div class="img-ph">${qualityEmoji(s.quality)}</div>`}
            </div>
            <div class="skin-card-body">
              <div class="skin-card-name">${s.name}</div>
              <div class="skin-card-meta" style="justify-content:space-between;align-items:center">
                <span style="color:var(--gold-light);font-size:11px">${s.hero}</span>
                ${tagSrc ? `<img src="${tagSrc}" style="height:14px;object-fit:contain;image-rendering:pixelated" title="${s.tag}" alt="${s.tag}">` : ''}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}
function openHeroFromStats(hero) {
  showView('heroes', document.getElementById('tab-heroes'), 'heroes');
  document.getElementById('heroes-list-wrap').style.display='none';
  document.getElementById('hero-detail-wrap').style.display='block';
  openHeroDetail(hero);
}

// ── Helpers ──
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function qualityEmoji(q) {
  return {'史诗':'💜','传说':'🌟','勇者':'💙','伴生':'💚','无双':'❤️','荣耀典藏':'🧡','珍品传说':'✨','珍品无双':'🔥'}[q]||'🎨';
}
